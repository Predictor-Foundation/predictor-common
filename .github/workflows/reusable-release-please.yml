# Reusable release-please workflow. Every Predictor service repo had a
# byte-identical `release-please.yml`; this is the single source of truth they
# call instead of each carrying their own copy.
#
# It authenticates as the release-bot GitHub App, so release PRs are authored by
# <app>[bot] rather than a human's PAT. An app is required because the
# Predictor-Foundation org disables Actions (the auto-provided GITHUB_TOKEN) from
# creating/approving PRs. Credentials are org-level: the App ID is the
# PRD_RELEASE_PLEASE_APP_ID org variable (read directly via the vars context) and
# the private key is the PRD_RELEASE_PLEASE_APP_PRIVATE_KEY org secret (reusable
# workflows only receive secrets via `secrets: inherit`, so callers must pass it).
#
# Caller (in a consumer repo, e.g. .github/workflows/release-please.yml):
#
#   name: Release Please
#   on:
#     push:
#       branches: [main]
#   permissions:
#     contents: write
#     pull-requests: write
#   jobs:
#     release-please:
#       uses: Predictor-Foundation/predictor-common/.github/workflows/reusable-release-please.yml@main
#       secrets: inherit
#
# The config-file / manifest-file inputs default to the repo-root filenames every
# repo already uses, so most callers pass only `secrets: inherit`.

name: Reusable Release Please

on:
  workflow_call:
    inputs:
      config-file:
        description: Path to the release-please config file.
        type: string
        default: release-please-config.json
      manifest-file:
        description: Path to the release-please manifest file.
        type: string
        default: .release-please-manifest.json

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate bot token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.PRD_RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.PRD_RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release-please
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: ${{ inputs.config-file }}
          manifest-file: ${{ inputs.manifest-file }}

      # Approve with the default GITHUB_TOKEN (github-actions[bot]) - a different
      # identity from the app bot that opened the PR, so the approval is accepted.
      - name: Auto approve
        if: steps.release-please.outputs.prs_created == 'true'
        run: gh pr review --approve "${{ fromJSON(steps.release-please.outputs.pr).number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
