# Reusable release-please workflow. Every Predictor service repo had a
# byte-identical `release-please.yml`; this is the single source of truth they
# call instead of each carrying their own copy.
#
# Caller (in a consumer repo, e.g. .github/workflows/release-please.yml):
#
#   name: Release Please
#   on:
#     push:
#       branches: [main]
#   permissions:
#     contents: write
#     pull-requests: write
#   jobs:
#     release-please:
#       uses: Predictor-Foundation/predictor-common/.github/workflows/reusable-release-please.yml@main
#       secrets:
#         release-please-token: ${{ secrets.RELEASE_PLEASE_TOKEN }}
#
# The config-file / manifest-file inputs default to the repo-root filenames every
# repo already uses, so most callers pass only the secret.

name: Reusable Release Please

on:
  workflow_call:
    inputs:
      config-file:
        description: Path to the release-please config file.
        type: string
        default: release-please-config.json
      manifest-file:
        description: Path to the release-please manifest file.
        type: string
        default: .release-please-manifest.json
    secrets:
      release-please-token:
        description: >-
          Fine-grained PAT with contents:write + pull-requests:write. Required
          because the Predictor-Foundation org disables Actions from creating or
          approving PRs, so the auto-provided GITHUB_TOKEN cannot do it.
        required: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@v4
        id: release-please
        with:
          token: ${{ secrets.release-please-token }}
          config-file: ${{ inputs.config-file }}
          manifest-file: ${{ inputs.manifest-file }}

      - name: Auto approve
        if: steps.release-please.outputs.prs_created == 'true'
        run: gh pr review --approve "${{ fromJSON(steps.release-please.outputs.pr).number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
