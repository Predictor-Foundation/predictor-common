name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@ivan-cholakov"

      - run: pnpm install --frozen-lockfile

      - name: build
        run: pnpm -r build

      - name: lint
        run: pnpm lint

      - name: typecheck
        run: pnpm -r exec tsc --noEmit
