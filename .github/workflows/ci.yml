name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          # Node 24 for CI: the packages' unit tests run TypeScript directly via
          # --experimental-strip-types (Node >=22.6). The published libraries still
          # target node >=20 (they ship compiled JS).
          node-version: "24"
          cache: "pnpm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@predictor-foundation"

      - run: pnpm install --frozen-lockfile

      - name: build
        run: pnpm -r build

      - name: typecheck
        run: |
          pnpm -r run typecheck
          pnpm -r run types:check

      - name: test
        run: pnpm -r run test

      - name: lint
        run: pnpm lint

      - name: catalog consistency
        run: pnpm run lint:catalog
