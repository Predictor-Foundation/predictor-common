name: release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  packages: write
  id-token: write
  # Required for actions/attest-build-provenance to write a Sigstore attestation for each
  # published tarball. (npm-registry provenance does not apply to GitHub Packages, so a build
  # attestation in the repo's attestation store is the equivalent supply-chain signal here.)
  attestations: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      # Mint a short-lived installation token for the release-bot GitHub App so the
      # release PR is authored by <app>[bot] instead of a human's PAT. An app (or PAT)
      # is required because the Predictor-Foundation org disables Actions (the
      # auto-provided GITHUB_TOKEN) from creating/approving PRs. The app must have
      # contents:write + pull-requests:write + packages:write on this repo; its App ID
      # lives in the PRD_RELEASE_PLEASE_APP_ID org variable and its private key in the
      # PRD_RELEASE_PLEASE_APP_PRIVATE_KEY org secret.
      - name: Generate bot token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.PRD_RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.PRD_RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ steps.app-token.outputs.token }}

  publish:
    needs: release-please
    if: needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    steps:
      # Mint an installation token for package publishing. The app carries
      # packages:write, which the auto-provided GITHUB_TOKEN lacks for packages
      # first published outside the workflow.
      - name: Generate bot token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ vars.PRD_RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.PRD_RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          registry-url: "https://npm.pkg.github.com"
          scope: "@predictor-foundation"

      - run: pnpm install --frozen-lockfile

      - name: build
        run: pnpm -r build

      - name: pack released packages
        env:
          PATHS_RELEASED: ${{ needs.release-please.outputs.paths_released }}
        run: |
          # Pack each released package into .artifacts/ so the exact published tarball can be attested,
          # recording pkg_path -> tarball in a manifest the publish step reads back. The manifest is
          # .tsv (not .tgz), so the attestation glob below does not pick it up as a subject.
          mkdir -p "$GITHUB_WORKSPACE/.artifacts"
          : > "$GITHUB_WORKSPACE/.artifacts/manifest.tsv"
          echo "$PATHS_RELEASED" | jq -r '.[]' | while read -r pkg_path; do
            tarball=$(cd "$GITHUB_WORKSPACE/$pkg_path" \
              && pnpm pack --pack-destination "$GITHUB_WORKSPACE/.artifacts" | tail -n 1)
            printf '%s\t%s\n' "$pkg_path" "$tarball" >> "$GITHUB_WORKSPACE/.artifacts/manifest.tsv"
          done

      - name: attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "${{ github.workspace }}/.artifacts/*.tgz"

      - name: publish released packages
        env:
          # The app installation token (packages:write) authenticates the publish;
          # the auto-provided GITHUB_TOKEN cannot write packages first published
          # outside the workflow.
          NODE_AUTH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          # Publish the exact tarball packed (and attested) above - not a fresh `pnpm publish` repack -
          # so the published artifact is byte-for-byte the one `gh attestation verify` will look up.
          while IFS=$'\t' read -r pkg_path tarball; do
            echo "publishing $pkg_path from $tarball"
            pnpm publish "$tarball" --no-git-checks --access restricted
          done < "$GITHUB_WORKSPACE/.artifacts/manifest.tsv"
